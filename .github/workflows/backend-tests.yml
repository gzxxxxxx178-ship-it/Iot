name: 后端离线测试

on:
  push:
    paths:
      - 'java/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'java/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置Java 运行时
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
      - name: 执行隔离测试
        run: ./mvnw -q -Dspring.profiles.active=test test
