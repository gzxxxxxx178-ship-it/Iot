# Production profile: activate explicitly with --spring.profiles.active=prod.
spring.config.activate.on-profile=prod

server.forward-headers-strategy=framework
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
deepseek.api.key=${DEEPSEEK_API_KEY}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI}
alipay.app-id=${ALIPAY_APP_ID}
alipay.private-key=${ALIPAY_PRIVATE_KEY}
alipay.alipay-public-key=${ALIPAY_PUBLIC_KEY}
alipay.notify-url=${ALIPAY_NOTIFY_URL}

mqtt.broker=${MQTT_BROKER}
mqtt.username=${MQTT_USERNAME}
mqtt.password=${MQTT_PASSWORD}
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS}
web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
auth.cookie.secure=true
auth.cookie.same-site=None

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.redis.enabled=true
