spring.application.name=IoTSystem

# Server configuration
server.address=0.0.0.0
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/iot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=你的数据库密码
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-wait=-1ms
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# DeepSeek API
deepseek.api.key=你的DeepSeek_API_Key
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# JWT
jwt.secret=你的Base64编码密钥
jwt.expiration=86400000

# Google OAuth2 (需要在 Google Cloud Console 创建凭据后填入)
spring.security.oauth2.client.registration.google.client-id=你的Google_Client_ID
spring.security.oauth2.client.registration.google.client-secret=你的Google_Client_Secret
spring.security.oauth2.client.registration.google.scope=email,profile

# 前端回调地址
app.oauth2.redirect-uri=http://localhost:5173

# 支付宝沙箱 (需在 openhome.alipay.com 沙箱应用获取)
alipay.app-id=你的沙箱APPID
alipay.private-key=你的应用私钥
alipay.alipay-public-key=支付宝公钥
alipay.gateway=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=http://你的外网地址/api/alipay/notify