spring.application.name=IoTSystem

# Active profile: dev (local) by default; override with --spring.profiles.active=prod on VPS
spring.profiles.active=dev

# Server
server.address=0.0.0.0
server.port=8080

# Database (password overridden by profile)
spring.datasource.url=jdbc:mysql://localhost:3306/iot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=PLACEHOLDER
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis (local)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-wait=-1ms
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# DeepSeek AI (key overridden by profile)
deepseek.api.key=PLACEHOLDER
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# JWT (secret overridden by profile)
jwt.secret=PLACEHOLDER
jwt.expiration=86400000

# Google OAuth2 (credentials overridden by profile)
spring.security.oauth2.client.registration.google.client-id=PLACEHOLDER
spring.security.oauth2.client.registration.google.client-secret=PLACEHOLDER
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 redirect after login
app.oauth2.redirect-uri=http://localhost:5173

# Alipay Sandbox (keys overridden by profile)
alipay.app-id=PLACEHOLDER
alipay.private-key=PLACEHOLDER
alipay.alipay-public-key=PLACEHOLDER
alipay.gateway=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=http://PLACEHOLDER/api/alipay/notify

# Dashboard device online threshold (seconds)
dashboard.device-online-timeout-seconds=30

# WebSocket security: comma-separated browser origins and one-time ticket lifetime
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173}
websocket.ticket-ttl-seconds=30

# MQTT TLS connection (credentials must be supplied by an ignored profile or environment)
mqtt.broker=${MQTT_BROKER:ssl://38.47.98.235.nip.io:8883}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.topic-root=agri
mqtt.client-id-prefix=iot-backend
mqtt.connection-timeout-seconds=10
mqtt.keep-alive-seconds=30
mqtt.initial-reconnect-delay-seconds=1
mqtt.max-reconnect-delay-seconds=60

# Sensor history governance
sensor.history.retention-enabled=${SENSOR_HISTORY_RETENTION_ENABLED:true}
sensor.history.retention-days=${SENSOR_HISTORY_RETENTION_DAYS:365}
sensor.history.cleanup-cron=${SENSOR_HISTORY_CLEANUP_CRON:0 30 3 * * *}
