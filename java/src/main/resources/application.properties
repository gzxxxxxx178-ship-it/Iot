spring.application.name=IoTSystem

# 默认激活本地开发环境 (application-dev.properties 覆盖)
spring.profiles.active=dev

# Server configuration
server.address=0.0.0.0
server.port=8080

# 数据库连接（用户名等公开信息可提交，密码在 -dev/-prod 中覆盖）
spring.datasource.url=jdbc:mysql://localhost:3306/iot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=占位符-由profile覆盖
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis（本地）
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-wait=-1ms
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# DeepSeek API
deepseek.api.key=占位符-由profile覆盖
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# JWT（占位符-由profile覆盖）
jwt.secret=占位符-由profile覆盖
jwt.expiration=86400000

# Google OAuth2（占位符-由profile覆盖）
spring.security.oauth2.client.registration.google.client-id=占位符-由profile覆盖
spring.security.oauth2.client.registration.google.client-secret=占位符-由profile覆盖
spring.security.oauth2.client.registration.google.scope=email,profile

# 前端回调地址
app.oauth2.redirect-uri=http://localhost:5173

# 支付宝沙箱（占位符-由profile覆盖）
alipay.app-id=占位符-由profile覆盖
alipay.private-key=占位符-由profile覆盖
alipay.alipay-public-key=占位符-由profile覆盖
alipay.gateway=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=http://你的外网地址/api/alipay/notify
