# 测试环境只使用内存数据库，不读取开发或生产凭据。
spring.datasource.url=jdbc:h2:mem:iot_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

# 测试只注入MQTT替身，以下值用于确保配置不会指向生产Broker。
mqtt.broker=ssl://test.invalid:8883
mqtt.username=test-user
mqtt.password=test-password
mqtt.topic-root=agri-test

# 测试不应依赖Redis网络服务。
spring.data.redis.host=127.0.0.1
spring.data.redis.port=1
spring.data.redis.repositories.enabled=false

# 为需要绑定配置的Bean提供非敏感占位值。
jwt.secret=dGVzdC1vbmx5LWp3dC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=
deepseek.api.key=test-only-key
spring.security.oauth2.client.registration.google.client-id=test-client
spring.security.oauth2.client.registration.google.client-secret=test-secret
alipay.app-id=test-app
alipay.private-key=test-private-key
alipay.alipay-public-key=test-public-key
alipay.gateway=https://test.invalid/alipay
alipay.notify-url=http://test.invalid/alipay/notify
app.oauth2.redirect-uri=http://localhost:5173
websocket.allowed-origins=http://localhost:5173
